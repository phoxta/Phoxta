<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Phoxta — Own a validated, AI-powered business</title>
    <meta
      name="description"
      content="Phoxta is a marketplace of validated, AI-powered businesses you can own and run from day one. Pick a business, make it yours, and go from launch to revenue in days — not months."
    />
    <!-- Additive crawl directives (per-page index/noindex set at runtime by PageMeta) -->
    <meta name="robots" content="max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://www.phoxta.com/" />
    <link rel="shortcut icon" type="image/x-icon" href="/assets/imgs/template/logo/favicon.svg" />

    <!-- Default social card (overridden per route by PageMeta; baked per-page when prerendered) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Phoxta" />
    <meta property="og:title" content="Phoxta — Own a validated, AI-powered business" />
    <meta
      property="og:description"
      content="A marketplace of validated, AI-powered businesses you can own and run from day one."
    />
    <meta property="og:url" content="https://www.phoxta.com/" />
    <meta property="og:image" content="https://www.phoxta.com/assets/imgs/template/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@phoxta" />
    <meta name="twitter:title" content="Phoxta — Own a validated, AI-powered business" />
    <meta
      name="twitter:description"
      content="A marketplace of validated, AI-powered businesses you can own and run from day one."
    />
    <meta name="twitter:image" content="https://www.phoxta.com/assets/imgs/template/og-image.jpg" />

    <!-- Google Fonts: DM Sans (matches Next.js next/font/google) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Vendor CSS (keep paths identical to HTML build) -->
    <link rel="stylesheet" href="/assets/css/vendors/carouselTicker.css" />
    <link rel="stylesheet" href="/assets/css/vendors/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/vendors/swiper-bundle.min.css" />
    <link rel="stylesheet" href="/assets/css/vendors/nice-select.css" />
    <link rel="stylesheet" href="/assets/css/vendors/font-awesome-pro.css" />
    <link rel="stylesheet" href="/assets/css/vendors/magnific-popup.css" />
    <link rel="stylesheet" href="/assets/css/vendors/odometer.css" />
    <link rel="stylesheet" href="/assets/css/vendors/spacing.css" />

    <!-- Main CSS -->
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/sticky-cards.css" />

    <!-- Theme init before paint -->
    <script src="/scripts/theme-init.js"></script>
  </head>
  <body class="at-magic-cursor">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
